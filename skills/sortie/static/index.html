<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sortie dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="header">
    <div class="header-left">
      <span class="logo">sortie</span>
      <span class="live-dot"></span>
      <span class="live-label">LIVE</span>
    </div>
    <div class="header-right">
      <div id="view-toggle" class="view-toggle">
        <button class="toggle-btn active" data-view="agent">Agents</button>
        <button class="toggle-btn" data-view="task">Tasks</button>
      </div>
      <div id="header-stats" class="header-stats">Loading...</div>
    </div>
  </div>
  <div id="stat-chips" class="stat-chips"></div>
  <div id="main-view"></div>
  <script src="/static/app.js"></script>
</body>
</html>
